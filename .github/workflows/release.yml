name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v0.1.0
      - "v[0-9]+.[0-9]+.[0-9]+-*"      # v0.1.0-alpha.1

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: lynxes

jobs:
  # ── Validate the tag matches Cargo.toml version ───────────────────────────────
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is-prerelease: ${{ steps.get-version.outputs.is-prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: get-version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-"* ]]; then
            echo "is-prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Cargo.toml version matches tag
        run: |
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          # Strip pre-release suffix for comparison (v0.1.0-alpha.1 → 0.1.0)
          TAG_BASE="${TAG_VER%%-*}"
          if [[ "$CARGO_VER" != "$TAG_BASE" ]]; then
            echo "Version mismatch: Cargo.toml=$CARGO_VER, tag=$TAG_BASE"
            exit 1
          fi
          echo "Version OK: $CARGO_VER"

  # ── Build wheels (matrix: 5 targets) ─────────────────────────────────────────
  build-wheels:
    name: Wheel · ${{ matrix.platform.name }}
    needs: validate-version
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux x86_64 — manylinux_2_28 (glibc 2.28+, covers RHEL8/Ubuntu20+)
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_28
            args: --release

          # Linux aarch64 — emulated via QEMU
          - name: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_28
            args: --release

          # macOS x86_64 (Intel)
          - name: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            manylinux: ""
            args: --release

          # macOS aarch64 (Apple Silicon)
          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            manylinux: ""
            args: --release

          # Windows x86_64
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
            args: --release

    steps:
      - uses: actions/checkout@v4

      # QEMU needed for cross-compiling aarch64 on ubuntu runners
      - name: Set up QEMU (Linux aarch64 only)
        if: matrix.platform.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: aarch64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Build with maturin-action — handles manylinux Docker automatically for Linux
      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: ${{ matrix.platform.args }} --out dist
          working-directory: py-lynxes
          # Pass the correct manifest path inside the container
          before-script-linux: |
            # Ensure the workspace root Cargo.toml is accessible
            echo "Build environment ready"

      - name: Build wheels (macOS / Windows)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.args }} --out dist
          working-directory: py-lynxes

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.name }}
          path: py-lynxes/dist/*.whl
          if-no-files-found: error

  # ── Build pure-Python sdist ───────────────────────────────────────────────────
  build-sdist:
    name: Source distribution
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: py-lynxes

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: py-lynxes/dist/*.tar.gz
          if-no-files-found: error

  # ── Smoke-test each wheel before publishing ───────────────────────────────────
  test-wheels:
    name: Smoke test · ${{ matrix.platform.name }}
    needs: build-wheels
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            runner: ubuntu-latest
          - name: macos-x86_64
            runner: macos-13
          - name: macos-arm64
            runner: macos-14
          - name: windows-x86_64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.platform.name }}
          path: dist/

      - name: Install wheel and test
        shell: bash
        run: |
          pip install dist/*.whl pyarrow pytest
          # Run a quick smoke test (no Rust compile needed — already a wheel)
          pytest py-lynxes/tests/unit -v --tb=short -x -q

  # ── Publish to PyPI (Trusted Publishing — no token needed) ───────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, test-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/lynxes/
    permissions:
      id-token: write  # Required for OIDC Trusted Publishing

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: List artifacts to be published
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Set to true for first-time or testing
          # verbose: true

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          # Extract commits since the previous tag
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" | head -30)
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)")
          fi
          # Write to file (multiline safe)
          echo "$CHANGELOG" > CHANGELOG_FRAGMENT.md
          echo "prev-tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lynxes ${{ github.ref_name }}"
          prerelease: ${{ needs.validate-version.outputs.is-prerelease }}
          body_path: CHANGELOG_FRAGMENT.md
          files: dist/*
          generate_release_notes: true
